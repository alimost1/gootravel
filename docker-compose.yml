version: '3.8'

services:
  # --------------------------------------------------------
  # WordPress Application (built from your repo's Dockerfile)
  # Coolify/Traefik handles port 80/443 routing automatically.
  # Do NOT expose ports directly here — that causes conflicts.
  # --------------------------------------------------------
  wordpress:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gootravel_wordpress
    restart: unless-stopped
    # NO ports: mapping — Coolify's Traefik proxy manages routing
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_TABLE_PREFIX: ${DB_TABLE_PREFIX:-wp_}
      WP_HOME: ${WP_HOME}
      WP_SITEURL: ${WP_SITEURL}
      # Secret keys — set these in Coolify env vars dashboard
      AUTH_KEY: ${AUTH_KEY}
      SECURE_AUTH_KEY: ${SECURE_AUTH_KEY}
      LOGGED_IN_KEY: ${LOGGED_IN_KEY}
      NONCE_KEY: ${NONCE_KEY}
      AUTH_SALT: ${AUTH_SALT}
      SECURE_AUTH_SALT: ${SECURE_AUTH_SALT}
      LOGGED_IN_SALT: ${LOGGED_IN_SALT}
      NONCE_SALT: ${NONCE_SALT}
      WP_DEBUG: ${WP_DEBUG:-false}
    volumes:
      - wp_uploads:/var/www/html/wp-content/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wordpress_network

  # --------------------------------------------------------
  # MySQL Database
  # --------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: gootravel_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wordpress_network

volumes:
  db_data:
    driver: local
  wp_uploads:
    driver: local

networks:
  wordpress_network:
    driver: bridge
